<template>
    <div class="nps-form">
        <div class="score-options">
            <template for:each={scoreStyles} for:item="option">
                <div key={option.value} data-value={option.value} style={option.style} class="score-option" onclick={handleScoreClick}>
                    {option.label}
                </div>
            </template>
        </div>
    </div>
</template>
