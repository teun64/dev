<template>
    <div class="card" onclick={handleClick}>
        <div class="card-image">
            <template if:true={product.imageUrl}>
                <img src={product.imageUrl} alt={displayName} class="product-image" />
            </template>
            <template if:false={product.imageUrl}>
                <div class="image-placeholder">
                    <span>Geen afbeelding</span>
                </div>
            </template>
        </div>
        <div class="card-body">
            <p class="product-code">{product.productCode}</p>
            <h3 class="product-name">{displayName}</h3>
            <p class="product-description">{product.shortDescription}</p>
            <p class="product-price">{formattedPrice}</p>
            <template if:true={hasTiers}>
                <div class="tier-table">
                    <template for:each={enrichedTiers} for:item="tier">
                        <div key={tier.key} class="tier-row">
                            <span class="tier-qty">v.a. {tier.fromQty} st.</span>
                            <span class="tier-price">{tier.formattedPrice}</span>
                        </div>
                    </template>
                </div>
            </template>
            <button class="btn-add-cart" onclick={handleAddToCart}>In winkelwagen</button>
        </div>
    </div>
</template>
